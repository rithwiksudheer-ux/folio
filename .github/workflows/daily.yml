#workflow name-appear in actions tab
name: Pulse - Daily summary bot

on:
  #schedule run-2:30 utc -> 8:00 am IST
  schedule:
    - cron: '30 2 * * *'
  #manual trigger - adds a run workflow button for testing
  workflow_dispatch:

jobs:
  run-pulse:                    #job name(your choice)
    runs-on: ubuntu-latest      #github free linux server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt
    
      - name: Run Pulse bot
        run: python bot.py
        env:
          EMAIL_SENDER: ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}

      - name: Upload summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary
          path: daily_summary.txt